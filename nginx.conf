server {
    listen 80;
    server_name _;
    server_tokens off;
    client_max_body_size 5m;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Main application routes
    location /wajibika-mazingira/ {
        try_files $uri $uri/ /wajibika-mazingira/index.html;
        # HTML should not be immutable - it references hashed assets
        expires 1h;
        add_header Cache-Control "public, must-revalidate" always;
    }

    # Static assets with long-term caching (hashed filenames)
    location /wajibika-mazingira/assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable" always;
    }

    # Health check endpoint
    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "healthy\n";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
}
