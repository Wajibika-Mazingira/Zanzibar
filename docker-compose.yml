version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: wajibika-frontend
    ports:
      - "80:80"
    environment:
      - API_BASE_URL=http://server:4001
    depends_on:
      - server
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - wajibika
    security_opt:
      - no-new-privileges:true

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: wajibika-server
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4001/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s
    networks:
      - wajibika
    security_opt:
      - no-new-privileges:true

networks:
  wajibika:
    driver: bridge
