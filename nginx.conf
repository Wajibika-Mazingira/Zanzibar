server {
    listen 80;
    server_name _;
    client_max_body_size 25m;

    root /usr/share/nginx/html;
    index index.html;

    # Main application routes - use history mode
    location /wajibika-mazingira/ {
        try_files $uri $uri/ /wajibika-mazingira/index.html;
        expires 1h;
        add_header Cache-Control "public, immutable" always;
    }

    # Static assets with caching
    location /wajibika-mazingira/assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable" always;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
