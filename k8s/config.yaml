  # Generate with: openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout tls.key -out tls.crt
  tls.crt: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tCk1JSUN1akNDQWFvQ0NRQ0dHSUd6a3g4L1RBREFWQ0czSHVPY0YxWHZVMjl5YnVxYkg4Y2o3TVlJZEkwRW5WOGg4PSoNCi0tLS0tRU5EIENFUlRJRklDQVRFLS0tLS0=
