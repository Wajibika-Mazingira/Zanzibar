---
# ConfigMap for frontend configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: wajibika-config
  namespace: wajibika-mazingira
data:
  # API configuration
  API_BASE_URL: "http://wajibika-server:4001"
  API_TIMEOUT: "30000"
  
  # AI configuration defaults
  AI_PROVIDER: "ollama"  # Options: ollama, openrouter
  OLLAMA_BASE_URL: "http://ollama:11434"
  
  # Feature flags
  ENABLE_IMAGE_ANALYSIS: "true"
  ENABLE_MARKET_TRADING: "true"
  ENABLE_GOVERNANCE: "true"
  
  # PDF generation
  PDF_MAX_SIZE_MB: "25"

---
# ConfigMap for Nginx configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: wajibika-mazingira
data:
  nginx.conf: |
    server {
        listen 80;
        server_name _;
        client_max_body_size 5m;

        root /usr/share/nginx/html;
        index index.html;

        # Main application routes
        location /wajibika-mazingira/ {
            try_files $uri $uri/ /wajibika-mazingira/index.html;
            expires 1h;
            add_header Cache-Control "public, must-revalidate" always;
        }

        # Static assets with caching
        location /wajibika-mazingira/assets/ {
            expires 30d;
            add_header Cache-Control "public, immutable" always;
        }

        # Health check
        location /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "healthy\n";
        }

        # Deny hidden files
        location ~ /\. {
            deny all;
        }
    }

---
