---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: wajibika-mazingira

---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wajibika-frontend
  namespace: wajibika-mazingira
  labels:
    app: wajibika-frontend
    component: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: wajibika-frontend
  template:
    metadata:
      labels:
        app: wajibika-frontend
        component: frontend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      containers:
      - name: frontend
        image: wajibika-mazingira:frontend-latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 2
        securityContext:
          runAsNonRoot: true
          runAsUser: 101
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: cache
          mountPath: /var/cache/nginx
        - name: run
          mountPath: /var/run
      volumes:
      - name: cache
        emptyDir: {}
      - name: run
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - wajibika-frontend
              topologyKey: kubernetes.io/hostname

---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: wajibika-frontend
  namespace: wajibika-mazingira
  labels:
    app: wajibika-frontend
spec:
  type: ClusterIP
  selector:
    app: wajibika-frontend
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP

---
# Backend (PDF Server) Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wajibika-server
  namespace: wajibika-mazingira
  labels:
    app: wajibika-server
    component: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: wajibika-server
  template:
    metadata:
      labels:
        app: wajibika-server
        component: backend
    spec:
      containers:
      - name: server
        image: wajibika-mazingira:server-latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 4001
          protocol: TCP
        env:
        - name: PORT
          value: "4001"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 2
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - wajibika-server
              topologyKey: kubernetes.io/hostname

---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: wajibika-server
  namespace: wajibika-mazingira
  labels:
    app: wajibika-server
spec:
  type: ClusterIP
  selector:
    app: wajibika-server
  ports:
  - name: http
    port: 4001
    targetPort: http
    protocol: TCP
